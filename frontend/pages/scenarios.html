<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Scenarios – SAP SkillBridge</title>
    <link rel="stylesheet" href="../css/fiori.css?v=6.0">
    <style>
        /* ── Page layout ─────────────────────────────────── */
        body { overflow: auto; background: #f2f2f2; }

        .scenarios-shell {
            min-height: 100vh;
            padding-top: 44px;
            padding-bottom: 32px;
        }

        .scenarios-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        .page-header { margin-bottom: 28px; }
        .page-header h1 { font-size: 24px; font-weight: 400; color: #32363a; margin-bottom: 4px; }
        .page-header p  { font-size: 14px; color: #6a6d70; }

        /* ── Scenario card ───────────────────────────────── */
        .scenario-card {
            background: #fff;
            border-radius: 6px;
            padding: 22px 24px;
            margin-bottom: 16px;
            border: 1px solid #d9d9d9;
            border-left: 4px solid #0070f2;
            cursor: pointer;
            transition: box-shadow 0.15s, transform 0.12s;
        }
        .scenario-card:hover {
            box-shadow: 0 4px 18px rgba(0,0,0,0.10);
            transform: translateY(-2px);
        }
        .scenario-card.completed { border-left-color: #107e3e; }

        .scenario-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .scenario-card-title { font-size: 18px; font-weight: 600; color: #32363a; }
        .scenario-card-desc  { color: #6a6d70; font-size: 14px; margin-bottom: 10px; }

        .scenario-meta { display: flex; gap: 14px; align-items: center; font-size: 12px; color: #89919a; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-easy   { background: #d0e2ff; color: #0043ce; }
        .badge-medium { background: #ffd6a5; color: #8a3800; }
        .badge-hard   { background: #ffb3b8; color: #750e13; }
        .badge-module { background: #e8f0fb; color: #0070f2; }

        /* ── Modal overlay ───────────────────────────────── */
        .scenario-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }
        .scenario-modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            border-radius: 8px;
            width: 100%;
            max-width: 820px;
            margin: auto;
            overflow: hidden;
        }

        .modal-header {
            background: #0070f2;
            color: #fff;
            padding: 20px 28px;
        }
        .modal-header h2 { font-size: 18px; font-weight: 600; }
        .modal-header .step-counter { font-size: 13px; opacity: 0.85; margin-top: 2px; }

        .modal-body { padding: 24px 28px; }

        /* ── Step types ──────────────────────────────────── */
        .situation-box {
            background: #fff4e5;
            border-left: 4px solid #f1c21b;
            padding: 16px 18px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .situation-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
        .situation-row { font-size: 13px; margin-bottom: 4px; }
        .situation-row strong { color: #32363a; }

        .symptoms-box {
            background: #ffe6e6;
            border-left: 4px solid #da1e28;
            padding: 16px 18px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .symptoms-box h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
        .symptoms-box ul { padding-left: 18px; font-size: 13px; }
        .symptoms-box li { margin-bottom: 4px; }

        /* SAP terminal output */
        .sap-terminal {
            background: #23303e;
            color: #c8e6ff;
            padding: 16px 18px;
            border-radius: 4px;
            font-family: "Courier New", monospace;
            font-size: 12.5px;
            line-height: 1.7;
            margin: 14px 0;
            overflow-x: auto;
            white-space: pre;
        }
        .sap-terminal .t-header { color: #64b5f6; font-weight: 700; }
        .sap-terminal .t-ok     { color: #7dd87d; }
        .sap-terminal .t-warn   { color: #f6c76e; }
        .sap-terminal .t-err    { color: #f8a0a0; }
        .sap-terminal .t-cmd    { color: #fff; font-weight: 700; }

        .analysis-box {
            background: #f0faf4;
            border-left: 4px solid #107e3e;
            padding: 14px 18px;
            border-radius: 4px;
            font-size: 13px;
            color: #0a4020;
            margin-top: 12px;
        }
        .analysis-box h3 { font-weight: 700; margin-bottom: 6px; }

        /* Question */
        .question-box {
            background: #e8f0fb;
            border-left: 4px solid #0070f2;
            padding: 18px;
            border-radius: 4px;
            margin-bottom: 18px;
        }
        .question-box h3 { font-size: 15px; font-weight: 700; color: #0a3d7a; }

        .option-btn {
            display: block;
            width: 100%;
            background: #fff;
            border: 2px solid #d9d9d9;
            padding: 14px 18px;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            color: #32363a;
            margin-bottom: 10px;
            transition: border-color 0.15s, background 0.15s;
        }
        .option-btn:hover:not(:disabled) { border-color: #0070f2; background: #f5f9ff; }
        .option-btn.correct  { border-color: #107e3e; background: #f0faf4; }
        .option-btn.incorrect{ border-color: #da1e28; background: #ffe6e6; }
        .option-btn:disabled { cursor: default; }

        .feedback-box {
            padding: 16px 18px;
            border-radius: 6px;
            margin-top: 4px;
            font-size: 13px;
            white-space: pre-line;
            display: none;
        }
        .feedback-box.show { display: block; }
        .feedback-box.correct   { background: #f0faf4; border-left: 4px solid #107e3e; color: #0a4020; }
        .feedback-box.incorrect { background: #ffe6e6; border-left: 4px solid #da1e28; color: #5a0000; }

        /* Action step */
        .action-steps { margin-top: 14px; }
        .action-step-group { margin-bottom: 14px; }
        .action-step-group h4 { font-size: 13px; font-weight: 700; color: #354a5e; margin-bottom: 6px; }
        .action-step-group ul { padding-left: 18px; font-size: 13px; color: #32363a; }
        .action-step-group li { margin-bottom: 4px; }

        /* Completion */
        .completion-header {
            text-align: center;
            padding: 28px 0 18px;
        }
        .completion-header .trophy { font-size: 52px; margin-bottom: 12px; }
        .completion-header h2 { font-size: 22px; font-weight: 700; color: #107e3e; }
        .completion-header p  { color: #6a6d70; font-size: 14px; }

        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 18px 0;
        }
        .score-item {
            background: #f0faf4;
            border: 1px solid #a3d9b4;
            border-radius: 6px;
            padding: 12px 16px;
            text-align: center;
        }
        .score-item .score-label { font-size: 11px; color: #6a6d70; text-transform: uppercase; letter-spacing: 0.05em; }
        .score-item .score-value { font-size: 18px; font-weight: 700; color: #107e3e; margin-top: 2px; }

        .lessons-list { padding-left: 0; list-style: none; }
        .lessons-list li {
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
            color: #32363a;
        }

        /* Modal footer */
        .modal-footer {
            padding: 16px 28px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-primary {
            background: #0070f2;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.12s;
        }
        .btn-primary:hover { background: #0057c2; }
        .btn-primary:disabled { background: #89919a; cursor: default; }

        .btn-secondary {
            background: #fff;
            color: #32363a;
            border: 1px solid #d9d9d9;
            padding: 11px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-secondary:hover { background: #f4f4f4; }

        .step-progress {
            font-size: 12px;
            color: #89919a;
            margin-left: auto;
        }

        /* Progress bar */
        .progress-bar-wrap {
            height: 4px;
            background: #e5e5e5;
        }
        .progress-bar-fill {
            height: 4px;
            background: #0070f2;
            transition: width 0.3s;
        }

        /* nav link back to simulator */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #0070f2;
            text-decoration: none;
            margin-bottom: 18px;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body class="fiori-body scenarios-shell">

    <!-- Shell bar -->
    <header class="fiori-shell-bar">
        <div class="shell-left">
            <span class="shell-logo">SAP</span>
            <span class="shell-app-title">S/4HANA Finance &amp; Controlling</span>
        </div>
        <div class="shell-right">
            <span class="shell-meta">Client 1000</span>
            <span class="shell-meta">S4H</span>
            <div class="shell-user-avatar">C</div>
        </div>
    </header>

    <div class="scenarios-container">
        <a href="index.html" class="back-link">&#8592; Back to Simulator</a>

        <div class="page-header">
            <h1>🎯 Interactive Practice Scenarios</h1>
            <p>Practice real SAP FI/CO Senior Manager situations step by step — with coaching, terminal output, and multiple-choice questions</p>
            <p style="margin-top:8px;font-size:13px;color:#107e3e;font-weight:600;" id="completionCounter">0 / 5 completed</p>
        </div>

        <div id="scenariosList"></div>
    </div>

    <!-- Modal -->
    <div id="scenarioModal" class="scenario-modal">
        <div class="modal-content">
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
            </div>
            <div class="modal-header">
                <h2 id="modalTitle">Loading…</h2>
                <div class="step-counter" id="stepCounter"></div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn-primary" id="continueBtn" disabled>Continue →</button>
                <button class="btn-secondary" id="exitBtn">Exit</button>
                <span class="step-progress" id="stepProgress"></span>
            </div>
        </div>
    </div>

    <script>
    // ── SAP FI/CO Scenarios ──────────────────────────────────────────────────
    const scenarios = [
        {
            id: 1,
            title: "🔴 Payment Run Blocked: Vendor Invoice Under Review",
            module: "FI-AP",
            difficulty: "medium",
            description: "The weekly F110 payment run produced an exception. Vendor V100002 has an invoice of USD 470,000 blocked with payment block R. The CFO needs a recommendation before payment posting.",
            duration: "20-30 min",
            steps: [
                {
                    type: "situation",
                    title: "Business Context",
                    content: {
                        time: "08:45 AM – Monday morning",
                        alert: "F110 payment run completed with 1 exception",
                        runId: "RUN-A (2026-07-05)",
                        impact: "USD 470,000 vendor payment on hold",
                        pressure: "CFO asks: release or hold? Decision needed before 10:00 AM",
                        risk: "Releasing without review = governance violation"
                    },
                    symptoms: [
                        "F110 proposal created successfully",
                        "Payment posting NOT yet executed",
                        "Document 1900012351 flagged with payment block R",
                        "Vendor V100002 (Global Component Supply) affected"
                    ]
                },
                {
                    type: "question",
                    question: "What is the FIRST transaction you run to investigate this payment run exception?",
                    options: [
                        { id: "A", text: "FB03 – Display the blocked document directly to see the invoice", correct: false,
                          feedback: "❌ Not wrong, but suboptimal. You don't yet have the document number confirmed from the run. Start with F110 to get the full picture of the proposal." },
                        { id: "B", text: "F110 – Review the payment run proposal status and exception list", correct: true,
                          feedback: "✅ CORRECT. F110 is the starting point. It shows you the full proposal: which documents are included, which are proposed for payment, and which have exceptions requiring manual review. This is how Senior FI Managers operate." },
                        { id: "C", text: "FBL1N – Check all open vendor items immediately", correct: false,
                          feedback: "❌ FBL1N is the right second step, but not the first. Start with F110 to understand the payment run context before drilling into vendor line items." },
                        { id: "D", text: "Call the vendor to confirm the invoice is correct", correct: false,
                          feedback: "❌ That is a business action, not a system investigation. Always investigate in SAP first, then make a business call." }
                    ]
                },
                {
                    type: "result",
                    title: "F110 – Payment Run Proposal",
                    content: "You open F110 with Run Date 2026-07-05 / Identification RUN-A. The proposal screen shows:",
                    terminalLines: [
                        { cls: "t-header", text: "Automatic Payment Transactions – Run RUN-A (2026-07-05)" },
                        { cls: "",         text: "Company Code: 1000  |  Payment Date: 2026-07-05  |  Status: Proposal Created" },
                        { cls: "",         text: "─────────────────────────────────────────────────────────────────────" },
                        { cls: "t-header", text: "Payment Proposal – Document List" },
                        { cls: "",         text: "" },
                        { cls: "t-ok",    text: "Vendor   Document      Invoice Ref.      Net Due      Amount (USD)    Block" },
                        { cls: "t-ok",    text: "V100001  1900012346    SUPP-INV-8876     2026-07-28   145,000.00      [OK]" },
                        { cls: "t-warn",  text: "V100002  1900012351    GLOB-INV-44518    2026-08-19   470,000.00      [!] R" },
                        { cls: "",         text: "" },
                        { cls: "t-warn",  text: "Exceptions: 1 document with payment block R" },
                        { cls: "t-err",   text: "Payment posting NOT executed — manual review required (Message: ZP 047)" }
                    ],
                    analysis: "The proposal is clear: document 1900012351 for vendor V100002 has payment block R. Block R means 'manual release required'. USD 145K can be paid. USD 470K is on hold. Your next step is to investigate the blocked document."
                },
                {
                    type: "question",
                    question: "You confirmed the exception. Which transaction do you use NEXT to see all open items for vendor V100002?",
                    options: [
                        { id: "A", text: "FK03 – Display vendor master data", correct: false,
                          feedback: "❌ FK03 shows vendor master (address, bank, payment terms). Useful later, but not for seeing the open invoice details." },
                        { id: "B", text: "FBL1N – Vendor line items report", correct: true,
                          feedback: "✅ CORRECT. FBL1N is the standard AP transaction for reviewing vendor open items. It shows every open invoice, due date, amount, payment terms, and most importantly — any payment blocks. This is the tool you use before every payment run." },
                        { id: "C", text: "FB60 – Enter incoming invoice", correct: false,
                          feedback: "❌ FB60 creates a new vendor invoice. You need to display existing ones, not create a new one." },
                        { id: "D", text: "F-53 – Post outgoing payment", correct: false,
                          feedback: "❌ F-53 posts a manual payment. You must investigate BEFORE posting anything — especially with a governance block in place." }
                    ]
                },
                {
                    type: "result",
                    title: "FBL1N – Vendor V100002 Open Items",
                    content: "You run FBL1N for vendor V100002, company code 1000, open items as of 2026-07-05:",
                    terminalLines: [
                        { cls: "t-header", text: "Vendor Line Items – V100002 (Global Component Supply)" },
                        { cls: "",         text: "Company Code: 1000  |  Key Date: 2026-07-05  |  Open Items Only" },
                        { cls: "",         text: "─────────────────────────────────────────────────────────────────────" },
                        { cls: "",         text: "Document    Date        Invoice Ref.      Terms   Net Due      Amount (USD)    Pymt Block" },
                        { cls: "t-ok",    text: "1900012350  2026-06-10  GLOB-INV-44512    0002    2026-08-09   420,000.00      —" },
                        { cls: "t-warn",  text: "1900012351  2026-06-20  GLOB-INV-44518    0002    2026-08-19   470,000.00      R" },
                        { cls: "",         text: "─────────────────────────────────────────────────────────────────────" },
                        { cls: "",         text: "Total open balance: 890,000.00 USD   Open items: 2" },
                        { cls: "t-warn",  text: "[!] Payment block R on document 1900012351 — manual release required" }
                    ],
                    analysis: "Document 1900012350 (USD 420K) is clean — no block, due 2026-08-09. Document 1900012351 (USD 470K) has payment block R. You need to display this document in FB03 to understand what it contains before making a release recommendation."
                },
                {
                    type: "action",
                    title: "Displaying FI Document 1900012351 in FB03",
                    content: "You run FB03, enter document 1900012351, company code 1000, fiscal year 2026:",
                    commands: [
                        "Transaction: FB03",
                        "Document Number: 1900012351",
                        "Company Code:    1000",
                        "Fiscal Year:     2026",
                        "",
                        "Document Header:",
                        "  Type: KR (Vendor Invoice)   Date: 2026-06-20",
                        "  Reference: GLOB-INV-44518   Currency: USD",
                        "",
                        "Line Items:",
                        "001  300000  AP Global Component Supply        CR  470,000.00",
                        "002  130000  Raw Materials Inventory           DR  470,000.00",
                        "",
                        "Goods Receipt: 5000012360  Quantity: 470 units",
                        "PO Reference:  4500099887  Item 010",
                        "GR/IR Status:  MATCHED – GR and IR quantities agree"
                    ],
                    stepGroups: [
                        {
                            title: "What you found:",
                            actions: [
                                "✅ Document is a legitimate vendor invoice (type KR)",
                                "✅ Matched to a confirmed Goods Receipt (5000012360)",
                                "✅ PO reference is valid (4500099887)",
                                "✅ GR/IR quantities match — no discrepancy",
                                "⚠ Payment block R was placed manually (reason not documented in the system)"
                            ]
                        },
                        {
                            title: "Your recommendation to the CFO:",
                            actions: [
                                "Invoice is legitimate and goods have been received",
                                "Block R appears to be a precautionary hold — no system error found",
                                "Recommend: release payment block R with documented management approval",
                                "Document the release decision in the incident log before executing F110 posting"
                            ]
                        }
                    ]
                },
                {
                    type: "question",
                    question: "The CFO approves the release. What is the correct next action?",
                    options: [
                        { id: "A", text: "Run F110 payment posting immediately — the CFO approved verbally", correct: false,
                          feedback: "❌ Verbal approval is not sufficient for a USD 470K payment release in a governed environment. You need written documentation (email, approval workflow, or system note) before executing the posting." },
                        { id: "B", text: "Document the CFO approval in writing, remove the payment block in FBL1N, then re-run the F110 proposal and execute posting", correct: true,
                          feedback: "✅ CORRECT. This is the governance-compliant sequence:\n1. Document approval (email / workflow)\n2. Remove block R via FBL1N or FB02\n3. Re-run F110 proposal to confirm exception is cleared\n4. Execute payment posting\nThis protects you, the CFO, and the company in any audit." },
                        { id: "C", text: "Create a new manual payment with F-53 to bypass the blocked document", correct: false,
                          feedback: "❌ Never create duplicate payments to bypass a block. This creates a reconciliation nightmare and is a serious audit finding." },
                        { id: "D", text: "Cancel the payment run and ask the AP team to handle it next week", correct: false,
                          feedback: "❌ The vendor invoice is approaching due date and you have CFO approval. Deferring without reason is not professional and risks late payment fees." }
                    ]
                },
                {
                    type: "completion",
                    title: "Scenario Complete!",
                    summary: "You resolved the F110 payment run exception following SAP FI governance best practices.",
                    score: {
                        investigation: "Systematic",
                        governance: "Compliant",
                        communication: "Executive-level",
                        resolution: "Correct"
                    },
                    lessonsLearned: [
                        "✅ F110 is the starting point for all AP payment run investigations",
                        "✅ FBL1N reveals vendor open items and payment blocks in detail",
                        "✅ FB03 lets you trace a document to its source (PO, GR, IR)",
                        "✅ Payment block R always requires documented approval before release",
                        "✅ Never post payments without written governance trail",
                        "✅ The investigation chain is always: F110 → FBL1N → FB03"
                    ]
                }
            ]
        },

        // ── SCENARIO 2 ──────────────────────────────────────────────────────
        {
            id: 2,
            title: "🟡 IT Cost Center Over-Budget: Period Close at Risk",
            module: "CO-OM",
            difficulty: "medium",
            description: "Cost center 10103000 (IT Operations) is USD 25,000 over-budget (+13.2%) for period 006. Period close is in 24 hours. The Controller needs a root-cause finding for the CFO before the close window.",
            duration: "20-25 min",
            steps: [
                {
                    type: "situation",
                    title: "Business Context",
                    content: {
                        time: "2:00 PM – June 30 (last day of period 006)",
                        alert: "Period-close checklist: cost center 10103000 has unresolved variance",
                        costCenter: "10103000 – IT Operations (Manager: Mark Torres)",
                        variance: "Actual USD 215,000 vs Plan USD 190,000 (+USD 25,000 / +13.2%)",
                        pressure: "Controller: 'Cannot close period without this explained. CFO briefing in 2 hours'",
                        risk: "Unexplained variance will be flagged in external audit"
                    },
                    symptoms: [
                        "KSB1 shows cost center variance for period 006",
                        "G/L account 820000 (IT Infrastructure and Software) over-budget",
                        "No budget supplement has been approved",
                        "Responsible manager has not yet provided explanation"
                    ]
                },
                {
                    type: "question",
                    question: "Which SAP transaction gives you the actual vs plan cost breakdown for cost center 10103000?",
                    options: [
                        { id: "A", text: "FS10N – G/L Account Balance Display", correct: false,
                          feedback: "❌ FS10N shows G/L account totals at company code level. Useful for cross-checking later, but it doesn't show cost center-level plan vs actual." },
                        { id: "B", text: "KSB1 – Cost Centers: Actual Line Items", correct: true,
                          feedback: "✅ CORRECT. KSB1 is the primary CO transaction for cost center actual analysis. It shows every individual cost posting per cost center, per period, by G/L account — with plan vs actual comparison. This is what every CO consultant and Finance Manager uses for variance investigation." },
                        { id: "C", text: "FB03 – Display FI Document", correct: false,
                          feedback: "❌ FB03 shows individual accounting documents. You need the CO aggregate view first (KSB1), then you drill into FB03 to find the source document causing the variance." },
                        { id: "D", text: "KE30 – CO-PA Profitability Report", correct: false,
                          feedback: "❌ KE30 is for profit center / segment profitability analysis. For cost center variance, KSB1 is the correct tool." }
                    ]
                },
                {
                    type: "result",
                    title: "KSB1 – Cost Center 10103000 Actuals vs Plan",
                    content: "You run KSB1 for controlling area 1000, cost center 10103000, fiscal year 2026, periods 001–006:",
                    terminalLines: [
                        { cls: "t-header", text: "Cost Centers: Actual Line Items – KSB1" },
                        { cls: "",         text: "Controlling Area: 1000  |  Cost Center: 10103000 (IT Operations)" },
                        { cls: "",         text: "Fiscal Year: 2026  |  Periods: 001 – 006" },
                        { cls: "",         text: "─────────────────────────────────────────────────────────────────────" },
                        { cls: "t-header", text: "Prd  G/L     Description                       Plan        Actual      Variance   %" },
                        { cls: "t-ok",    text: "001  820000  IT Infrastructure & Software    32,000.00   31,200.00    -800.00   -2.5%" },

                        }
                    ]
                },
                {
                    type: "question",
                    question: "The customer confirms payment of USD 144,280 (docs 1800033201 + 1800033288). What is the correct next action in SAP?",
                    options: [
                        { id: "A", text: "Post the incoming payment using F-28, which clears the AR items and automatically releases the credit block", correct: true,
                          feedback: "✅ CORRECT. F-28 (Post Incoming Payment) posts the customer payment against the open AR items. Once docs 1800033201 and 1800033288 are cleared, the credit exposure drops from USD 534,218 to USD 389,938 — below the USD 500K limit. SAP automatically removes the credit block and VF01 can proceed." },

        // ── SCENARIO 5 – MM/FI: Intercompany Stock Transfer – Missing GR ────

                          feedback: "❌ Manual clearing of GR/IR without a real goods receipt creates a permanent accounting error. When the GR is eventually posted in period 007, a second debit will appear on GR/IR — making the problem twice as bad." },
                        { id: "B", text: "Document the GR/IR open item in the period-close notes as a timing difference. The GR is expected in early period 007 and will automatically clear the debit when posted.", correct: true,
                          feedback: "✅ CORRECT. A GR/IR open item at period-end is a normal occurrence in any purchasing-driven company. The correct treatment is:\n1. Document the open item in the close checklist (amount, PO, reason, expected GR date)\n2. Confirm the goods are in transit (vendor evidence)\n3. Assign responsibility to warehouse to post GR immediately upon physical receipt\n4. Period-close can proceed — the GR/IR balance is disclosed, not adjusted\nAuditors expect GR/IR open items at period-end. What they audit is whether they are monitored and cleared promptly." },

                          feedback: "❌ An accrual entry here would double-count the cost — the invoice is already posted to the AP account (CR 300000) and the GR/IR DR is the matching offset. A COGS accrual on top of this would overstate cost of goods by USD 95,000." }

                          feedback: "❌ The GR/IR clearing is fully automatic in SAP. When the GR is posted, the system credits account 191100 (GR/IR) and debits account 130000 (Inventory). The debit and credit on 191100 net to zero — the account is cleared without any manual intervention." },

    // ── Render scenario cards ────────────────────────────────────────────────
    const list = document.getElementById("scenariosList");
    scenarios.forEach(sc => {
        const diffClass = `badge-${sc.difficulty}`;
        const card = document.createElement("div");
        card.className = "scenario-card";
        card.innerHTML = `
            <div class="scenario-header-row">
                <div class="scenario-card-title">${sc.title}</div>
                <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;margin-left:16px;">
                    <span class="badge badge-module">${sc.module}</span>
                    <span class="badge ${diffClass}">${sc.difficulty}</span>
                </div>
            </div>
            <div class="scenario-card-desc">${sc.description}</div>
            <div class="scenario-meta">
                <span>⏱ ${sc.duration}</span>
                <span>📋 ${sc.steps.length} steps</span>
            </div>
        `;
        card.addEventListener("click", () => openScenario(sc));
        list.appendChild(card);
    });

    // ── Scenario engine ──────────────────────────────────────────────────────
    let activeScenario = null;
    let currentStep    = 0;
    let stepAnswered   = false;

    const modal       = document.getElementById("scenarioModal");
    const modalTitle  = document.getElementById("modalTitle");
    const stepCounter = document.getElementById("stepCounter");
    const modalBody   = document.getElementById("modalBody");
    const continueBtn = document.getElementById("continueBtn");
    const exitBtn     = document.getElementById("exitBtn");
    const progressBar = document.getElementById("progressBar");
    const stepProgress= document.getElementById("stepProgress");

    function openScenario(sc) {
        activeScenario = sc;
        currentStep    = 0;
        modal.classList.add("active");
        renderStep();
    }

    exitBtn.addEventListener("click", () => {
        modal.classList.remove("active");
        activeScenario = null;
    });

    continueBtn.addEventListener("click", () => {
        currentStep++;
        if (currentStep >= activeScenario.steps.length) {
            modal.classList.remove("active");
            return;
        }
        renderStep();
    });

    function renderStep() {
        const step  = activeScenario.steps[currentStep];
        const total = activeScenario.steps.length;
        const pct   = Math.round(((currentStep) / total) * 100);

        modalTitle.textContent  = `${activeScenario.title} – Step ${currentStep + 1}/${total}`;
        stepCounter.textContent = `Step ${currentStep + 1} of ${total}`;
        progressBar.style.width = pct + "%";
        stepProgress.textContent= `${currentStep + 1} / ${total}`;
        stepAnswered = false;

        continueBtn.disabled   = true;
        continueBtn.textContent = currentStep === total - 1 ? "Finish ✓" : "Continue →";

        const type = step.type;

        if (type === "situation")   renderSituation(step);
        else if (type === "question")    renderQuestion(step);
        else if (type === "result")      renderResult(step);
        else if (type === "action")      renderAction(step);
        else if (type === "completion")  renderCompletion(step);

        modalBody.scrollTop = 0;
    }

    function renderSituation(step) {
        const rows = Object.entries(step.content).map(([k, v]) =>
            `<div class="situation-row"><strong>${k}:</strong> ${v}</div>`
        ).join("");

        const symps = step.symptoms.map(s => `<li>${s}</li>`).join("");

        modalBody.innerHTML = `
            <div class="situation-box">
                <h3>🚨 Situation</h3>
                ${rows}
            </div>
            <div class="symptoms-box">
                <h3>🔍 Observed Symptoms</h3>
                <ul>${symps}</ul>
            </div>
        `;
        continueBtn.disabled = false;
    }

    function renderQuestion(step) {
        const opts = step.options.map(o => `
            <button class="option-btn" data-id="${o.id}" data-correct="${o.correct}" data-feedback="${encodeURIComponent(o.feedback)}">
                <strong>${o.id})</strong> ${o.text}
            </button>
        `).join("");

        modalBody.innerHTML = `
            <div class="question-box">
                <h3>❓ ${step.question}</h3>
            </div>
            <div id="optionsArea">${opts}</div>
            <div class="feedback-box" id="feedbackBox"></div>
        `;

        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                if (stepAnswered) return;
                stepAnswered = true;

                const correct  = btn.dataset.correct === "true";
                const feedback = decodeURIComponent(btn.dataset.feedback);

                document.querySelectorAll(".option-btn").forEach(b => {
                    b.disabled = true;
                    if (b.dataset.correct === "true") b.classList.add("correct");
                });
                if (!correct) btn.classList.add("incorrect");

                const fb = document.getElementById("feedbackBox");
                fb.textContent = feedback;
                fb.className = `feedback-box show ${correct ? "correct" : "incorrect"}`;

                continueBtn.disabled = false;
            });
        });
    }

    function renderResult(step) {
        const lines = step.terminalLines.map(l =>
            `<div class="${l.cls}">${l.text}</div>`
        ).join("");

        modalBody.innerHTML = `
            <div class="training-callout info" style="margin-bottom:14px;">
                <strong>${step.title}</strong><br>${step.content}
            </div>
            <div class="sap-terminal">${lines}</div>
            <div class="analysis-box">
                <h3>📊 Analysis</h3>
                ${step.analysis}
            </div>
        `;
        continueBtn.disabled = false;
    }

    function renderAction(step) {
        const cmds = step.commands.map(c => c).join("\n");

        const groups = (step.stepGroups || []).map(g => `
            <div class="action-step-group">
                <h4>${g.title}</h4>
                <ul>${g.actions.map(a => `<li>${a}</li>`).join("")}</ul>
            </div>
        `).join("");

        modalBody.innerHTML = `
            <div class="training-callout info" style="margin-bottom:12px;">
                <strong>${step.title}</strong><br>${step.content}
            </div>
            <div class="sap-terminal">${cmds}</div>
            <div class="action-steps">${groups}</div>
        `;
        continueBtn.disabled = false;
    }

    // ── Score persistence (localStorage) ────────────────────────────────────
    const STORAGE_KEY = "sap_skillbridge_progress";

    function loadProgress() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        } catch (e) {
            return {};
        }
    }

    function saveScenarioCompletion(scenarioId, scenarioTitle, scoreObj) {
        const progress = loadProgress();
        progress[scenarioId] = {
            id: scenarioId,
            title: scenarioTitle,
            completedAt: new Date().toISOString(),
            score: scoreObj
        };
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        } catch (e) { /* storage unavailable */ }
        updateProgressBadges();
    }

    function updateProgressBadges() {
        const progress = loadProgress();
        const completedIds = Object.keys(progress);
        document.querySelectorAll(".scenario-card").forEach(card => {
            const sc = card._scenarioData;
            if (sc && completedIds.includes(String(sc.id))) {
                card.classList.add("completed");
                if (!card.querySelector(".completed-badge")) {
                    const badge = document.createElement("span");
                    badge.className = "badge badge-easy completed-badge";
                    badge.textContent = "✓ Done";
                    const row = card.querySelector(".scenario-header-row > div");
                    if (row) row.prepend(badge);
                }
            }
        });
        // Update header counter
        const total    = scenarios.length;
        const done     = completedIds.length;
        const counter  = document.getElementById("completionCounter");
        if (counter) counter.textContent = `${done} / ${total} completed`;
    }

    function renderCompletion(step) {
        // Save progress when completion screen is rendered
        saveScenarioCompletion(activeScenario.id, activeScenario.title, step.score);

        const scores = Object.entries(step.score).map(([k, v]) => `
            <div class="score-item">
                <div class="score-label">${k}</div>
                <div class="score-value">${v}</div>
            </div>
        `).join("");

        const lessons = step.lessonsLearned.map(l => `<li>${l}</li>`).join("");

        const progress  = loadProgress();
        const totalDone = Object.keys(progress).length;

        modalBody.innerHTML = `
            <div class="completion-header">
                <div class="trophy">🏆</div>
                <h2>${step.title}</h2>
                <p>${step.summary}</p>
            </div>
            <div class="score-grid">${scores}</div>
            <div style="margin-top:14px;padding:10px 14px;background:#f0faf4;border-radius:6px;border-left:4px solid #107e3e;">
                <strong style="font-size:13px;color:#0a4020;">Overall Progress: ${totalDone} / ${scenarios.length} scenarios completed</strong>
            </div>
            <div style="margin-top:18px;">
                <strong style="font-size:13px;">Lessons Learned:</strong>
                <ul class="lessons-list" style="margin-top:10px;">${lessons}</ul>
            </div>
        `;
        continueBtn.disabled = false;
        continueBtn.textContent = "Finish ✓";
    }

    // ── Attach scenario data to card elements for badge update ───────────────
    (function attachScenarioDataToCards() {
        const cards = document.querySelectorAll(".scenario-card");
        cards.forEach((card, i) => {
            if (scenarios[i]) card._scenarioData = scenarios[i];
        });
    })();

    // Apply completion badges on page load
    updateProgressBadges();
    </script>
</body>
